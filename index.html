<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İsmin | Artist</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

header {
    text-align: center;
    padding: 80px 20px;
}

h1 {
    font-size: 42px;
    letter-spacing: 2px;
}

p {
    opacity: 0.7;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
    opacity: 0.8;
}

.footer {
    text-align: center;
    padding: 40px;
    opacity: 0.6;
}
</style>

</head>

<body>

<header>
    <h1>Ahmet Okumuş</h1>
    <p>Digital Artist / Creator</p>
</header>

<div class="gallery">
    <img src="https://picsum.photos/400?1">
    <img src="https://picsum.photos/400?2">
    <img src="https://picsum.photos/400?3">
    <img src="https://picsum.photos/400?4">
</div>

<div class="footer">
    <p>Instagram: @ahmetokumus1320</p>
</div>

</body>
</html>
